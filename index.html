<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planilha de Ações — Produtos BB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --card:      #20243a;
      --card-hover:#262b42;
      --border:    #2e3348;
      --text:      #e2e8f0;
      --muted:     #8892a4;
      --accent:    #0066cc;
      --accent-hover: #0052a3;

      --aprovacao:  #8b5cf6;
      --validacao:  #06b6d4;
      --andamento:  #f59e0b;
      --concluido:  #10b981;

      --pri-alta:  #ef4444;
      --pri-media: #f59e0b;
      --pri-baixa: #64748b;
      --imp-alto:  #10b981;
      --imp-medio: #3b82f6;
      --imp-baixo: #64748b;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 15px;
      color: var(--text);
    }
    .header-title span.dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      display: inline-block;
    }
    button#btn-refresh {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: border-color .2s, color .2s;
    }
    button#btn-refresh:hover { border-color: var(--accent); color: var(--text); }

    /* ── CONTROLES ── */
    .controls {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      min-height: 52px;
    }

    /* Abas de produto */
    .tabs {
      display: flex;
      gap: 2px;
    }
    .tab-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 14px 16px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
      white-space: nowrap;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }

    /* Filtro de mês */
    .filter-mes {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .filter-mes select {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      outline: none;
    }
    .filter-mes select:focus { border-color: var(--accent); }

    /* ── CONTADORES ── */
    .counters {
      display: flex;
      gap: 16px;
      padding: 16px 24px;
      overflow-x: auto;
    }
    .counter-card {
      width: 320px;
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .counter-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .counter-info { display: flex; flex-direction: column; gap: 2px; }
    .counter-label { font-size: 12px; color: var(--muted); font-weight: 500; }
    .counter-value { font-size: 24px; font-weight: 700; line-height: 1; }

    /* ── KANBAN ── */
    .board-wrap {
      padding: 0 24px 32px;
      overflow-x: auto;
    }
    .board {
      display: flex;
      gap: 16px;
      min-width: max-content;
      align-items: flex-start;
    }
    /* scrollbar dos contadores igual ao board */
    .counters::-webkit-scrollbar { height: 0; }
    /* sincroniza scroll horizontal dos contadores com o board */
    .column {
      width: 320px;
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 260px);
    }
    .column-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .column-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .column-count {
      font-size: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 2px 8px;
      border-radius: 20px;
    }
    .column-body {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      flex: 1;
    }
    .column-body::-webkit-scrollbar { width: 4px; }
    .column-body::-webkit-scrollbar-track { background: transparent; }
    .column-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      cursor: pointer;
      transition: background .15s, box-shadow .15s, border-color .15s;
    }
    .card:hover {
      background: var(--card-hover);
      border-color: #3e4562;
      box-shadow: 0 4px 16px rgba(0,0,0,.3);
    }
    .card-categoria {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-acao {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 10px;
      color: var(--text);
    }
    .card-footer {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
    }
    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .badge-mes { background: rgba(100,116,139,.18); color: #94a3b8; }

    .badge-pri-Alta   { background: rgba(239,68,68,.15);  color: #f87171; }
    .badge-pri-Média  { background: rgba(245,158,11,.15); color: #fbbf24; }
    .badge-pri-Baixa  { background: rgba(100,116,139,.15); color: #94a3b8; }

    .badge-eso-Alta   { background: rgba(239,68,68,.10);  color: #f87171; border: 1px solid rgba(239,68,68,.2); }
    .badge-eso-Média  { background: rgba(245,158,11,.10); color: #fbbf24; border: 1px solid rgba(245,158,11,.2); }
    .badge-eso-Baixa  { background: rgba(100,116,139,.10); color: #94a3b8; border: 1px solid rgba(100,116,139,.2); }

    .badge-imp-Alto   { background: rgba(16,185,129,.15); color: #34d399; }
    .badge-imp-Médio  { background: rgba(59,130,246,.15); color: #60a5fa; }
    .badge-imp-Baixo  { background: rgba(100,116,139,.15); color: #94a3b8; }

    /* ── EMPTY ── */
    .empty-col {
      text-align: center;
      padding: 32px 16px;
      color: var(--muted);
      font-size: 13px;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
      position: relative;
      transform: translateY(8px);
      transition: transform .2s;
    }
    .modal-overlay.active .modal { transform: translateY(0); }
    .modal::-webkit-scrollbar { width: 4px; }
    .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .modal-close {
      position: absolute;
      top: 16px; right: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 28px; height: 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: color .15s, border-color .15s;
    }
    .modal-close:hover { color: var(--text); border-color: #555; }

    .modal-status-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .modal-title {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 6px;
    }
    .modal-categoria {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 18px;
    }
    .modal-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 20px;
    }
    .modal-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 16px;
    }
    .modal-field { margin-bottom: 14px; }
    .modal-field-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 4px;
    }
    .modal-field-value {
      font-size: 13px;
      line-height: 1.55;
      color: var(--text);
    }

    /* ── SPINNER ── */
    #loading {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,17,23,.8);
      z-index: 300;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
    }
    #loading.active { display: flex; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: var(--muted); font-size: 13px; }

    /* ── ERROR ── */
    #error-msg {
      display: none;
      margin: 32px 24px;
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      color: #f87171;
      padding: 16px 20px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.5;
    }
    #error-msg.active { display: block; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .board { flex-direction: column; min-width: 0; }
      .column { width: 100%; max-height: none; }
      .controls { padding: 8px 16px; }
      .counters { padding: 12px 16px; }
      .board-wrap { padding: 0 16px 24px; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-title">
    <span class="dot"></span>
    Planilha de Ações — Produtos BB
  </div>
  <button id="btn-refresh">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
      <path d="M21 3v5h-5"/>
      <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
      <path d="M8 16H3v5"/>
    </svg>
    Atualizar
  </button>
</header>

<!-- CONTROLES -->
<div class="controls">
  <nav class="tabs" id="tabs"></nav>
  <div class="filter-mes">
    <label for="sel-mes">Mês:</label>
    <select id="sel-mes"><option value="">Todos</option></select>
  </div>
</div>

<!-- CONTADORES -->
<div class="counters">
  <div class="counter-card">
    <div class="counter-dot" style="background:var(--aprovacao)"></div>
    <div class="counter-info">
      <span class="counter-label">Em Aprovação</span>
      <span class="counter-value" id="cnt-aprovacao">0</span>
    </div>
  </div>
  <div class="counter-card">
    <div class="counter-dot" style="background:var(--validacao)"></div>
    <div class="counter-info">
      <span class="counter-label">Em Validação</span>
      <span class="counter-value" id="cnt-validacao">0</span>
    </div>
  </div>
  <div class="counter-card">
    <div class="counter-dot" style="background:var(--andamento)"></div>
    <div class="counter-info">
      <span class="counter-label">Em Andamento</span>
      <span class="counter-value" id="cnt-andamento">0</span>
    </div>
  </div>
  <div class="counter-card">
    <div class="counter-dot" style="background:var(--concluido)"></div>
    <div class="counter-info">
      <span class="counter-label">Concluído</span>
      <span class="counter-value" id="cnt-concluido">0</span>
    </div>
  </div>
</div>

<!-- KANBAN -->
<div class="board-wrap">
  <div class="board" id="board"></div>
</div>

<!-- ERROR -->
<div id="error-msg"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <p>Carregando demandas…</p>
</div>

<script>
  /* ── CONFIGURAÇÃO ── */
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwXvMMumU1mYh15R7tyQ-B02Lt0wtjzD2mZA5Y35EdC-pNuGvNvkOhxTQQuHZw5v8VK/exec";

  /* ── ESTADO ── */
  let allData = [];          // array de { produto, demandas[] }
  let produtoAtivo = null;
  let mesAtivo = "";

  const STATUS_LIST = ["Em aprovação", "Em validação", "Em andamento", "Concluído"];

  const STATUS_COLORS = {
    "Em aprovação": "var(--aprovacao)",
    "Em validação": "var(--validacao)",
    "Em andamento": "var(--andamento)",
    "Concluído":    "var(--concluido)"
  };

  /* ── ELEMENTOS ── */
  const $tabs      = document.getElementById("tabs");
  const $selMes    = document.getElementById("sel-mes");
  const $board     = document.getElementById("board");
  const $loading   = document.getElementById("loading");
  const $error     = document.getElementById("error-msg");
  const $overlay   = document.getElementById("modal-overlay");
  const $modalBody = document.getElementById("modal-content");
  const $btnClose  = document.getElementById("modal-close");
  const $btnRef    = document.getElementById("btn-refresh");

  /* ── FETCH ── */
  async function carregarDados() {
    mostrarLoading(true);
    ocultarErro();
    try {
      const url = APPS_SCRIPT_URL + "?t=" + Date.now();
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const json = await res.json();
      allData = json.sheets || [];
      if (allData.length === 0) throw new Error("Nenhum dado retornado.");
      produtoAtivo = allData[0].produto;
      renderTabs();
      renderFiltroMes();
      renderBoard();
    } catch (e) {
      mostrarErro("Não foi possível carregar os dados. Verifique a URL do Apps Script e tente novamente.<br><small>" + e.message + "</small>");
    } finally {
      mostrarLoading(false);
    }
  }

  /* ── TABS ── */
  function renderTabs() {
    $tabs.innerHTML = "";
    allData.forEach(sheet => {
      const btn = document.createElement("button");
      btn.className = "tab-btn" + (sheet.produto === produtoAtivo ? " active" : "");
      btn.textContent = sheet.produto;
      btn.addEventListener("click", () => {
        produtoAtivo = sheet.produto;
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.textContent === produtoAtivo));
        renderFiltroMes();
        renderBoard();
      });
      $tabs.appendChild(btn);
    });
  }

  /* ── FILTRO MÊS ── */
  function renderFiltroMes() {
    const sheet = allData.find(s => s.produto === produtoAtivo);
    const meses = [...new Set((sheet?.demandas || []).map(d => d.mes).filter(Boolean))];
    $selMes.innerHTML = '<option value="">Todos</option>';
    meses.forEach(m => {
      const opt = document.createElement("option");
      opt.value = m;
      opt.textContent = m;
      if (m === mesAtivo) opt.selected = true;
      $selMes.appendChild(opt);
    });
  }

  /* ── DEMANADAS FILTRADAS ── */
  function demandasFiltradas() {
    const sheet = allData.find(s => s.produto === produtoAtivo);
    let lista = sheet?.demandas || [];
    if (mesAtivo) lista = lista.filter(d => d.mes === mesAtivo);
    return lista;
  }

  /* ── BOARD ── */
  function renderBoard() {
    const lista = demandasFiltradas();

    // atualiza contadores
    const cnt = { "Em aprovação": 0, "Em validação": 0, "Em andamento": 0, "Concluído": 0 };
    lista.forEach(d => {
      const s = normalizeStatus(d.status);
      if (cnt[s] !== undefined) cnt[s]++;
    });
    document.getElementById("cnt-aprovacao").textContent = cnt["Em aprovação"];
    document.getElementById("cnt-validacao").textContent  = cnt["Em validação"];
    document.getElementById("cnt-andamento").textContent = cnt["Em andamento"];
    document.getElementById("cnt-concluido").textContent = cnt["Concluído"];

    // renderiza colunas
    $board.innerHTML = "";
    STATUS_LIST.forEach(status => {
      const demandas = lista.filter(d => normalizeStatus(d.status) === status);
      $board.appendChild(criarColuna(status, demandas));
    });
  }

  function normalizeStatus(s) {
    if (!s) return "";
    // remove espaços extras, normaliza acentos via unicode
    const v = s.toString().trim().toLowerCase()
               .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    if (v.includes("aprovac")) return "Em aprovação";
    if (v.includes("validac")) return "Em validação";
    if (v.includes("andamento")) return "Em andamento";
    if (v.includes("conclu")) return "Concluído";
    return s;
  }

  /* ── COLUNA ── */
  function criarColuna(status, demandas) {
    const col = document.createElement("div");
    col.className = "column";

    const header = document.createElement("div");
    header.className = "column-header";
    header.innerHTML = `
      <div class="column-title">
        <span class="status-dot" style="background:${STATUS_COLORS[status]}"></span>
        ${status}
      </div>
      <span class="column-count">${demandas.length}</span>
    `;

    const body = document.createElement("div");
    body.className = "column-body";

    if (demandas.length === 0) {
      body.innerHTML = '<div class="empty-col">Nenhuma demanda neste status.</div>';
    } else {
      demandas.forEach(d => body.appendChild(criarCard(d)));
    }

    col.appendChild(header);
    col.appendChild(body);
    return col;
  }

  /* ── CARD ── */
  function criarCard(d) {
    const card = document.createElement("div");
    card.className = "card";

    const priBadge   = `<span class="badge badge-pri-${d.prioridade}">↑ ${d.prioridade}</span>`;
    const esoBadge   = d.esforco  ? `<span class="badge badge-eso-${d.esforco}">Esforço ${d.esforco}</span>`  : "";
    const impBadge   = d.impacto  ? `<span class="badge badge-imp-${d.impacto}">Impacto ${d.impacto}</span>` : "";
    const mesBadge   = d.mes      ? `<span class="badge badge-mes">${d.mes}</span>` : "";

    card.innerHTML = `
      <div class="card-categoria">${d.categoria || "—"}</div>
      <div class="card-acao">${d.acao}</div>
      <div class="card-footer">
        ${mesBadge}${priBadge}${esoBadge}${impBadge}
      </div>
    `;
    card.addEventListener("click", () => abrirModal(d));
    return card;
  }

  /* ── MODAL ── */
  function abrirModal(d) {
    const cor = STATUS_COLORS[normalizeStatus(d.status)] || "#64748b";
    const priBadge  = `<span class="badge badge-pri-${d.prioridade}">Prioridade ${d.prioridade}</span>`;
    const esoBadge  = d.esforco  ? `<span class="badge badge-eso-${d.esforco}">Esforço ${d.esforco}</span>` : "";
    const impBadge  = d.impacto  ? `<span class="badge badge-imp-${d.impacto}">Impacto ${d.impacto}</span>` : "";
    const mesBadge  = d.mes      ? `<span class="badge badge-mes">${d.mes}</span>` : "";

    const campo = (label, valor) => valor
      ? `<div class="modal-field">
          <div class="modal-field-label">${label}</div>
          <div class="modal-field-value">${valor}</div>
        </div>`
      : "";

    $modalBody.innerHTML = `
      <span class="modal-status-tag" style="background:${cor}22;color:${cor};">${d.status || "—"}</span>
      <div class="modal-title">${d.acao}</div>
      <div class="modal-categoria">${d.categoria || ""}</div>
      <div class="modal-badges">${mesBadge}${priBadge}${esoBadge}${impBadge}</div>
      <hr class="modal-divider">
      ${campo("Descrição", d.descricao)}
      ${campo("Justificativa", d.justificativa)}
      ${campo("Explicação", d.explicacao)}
    `;
    $overlay.classList.add("active");
  }

  function fecharModal() { $overlay.classList.remove("active"); }

  $btnClose.addEventListener("click", fecharModal);
  $overlay.addEventListener("click", e => { if (e.target === $overlay) fecharModal(); });
  document.addEventListener("keydown", e => { if (e.key === "Escape") fecharModal(); });

  /* ── FILTRO MÊS ── */
  $selMes.addEventListener("change", () => {
    mesAtivo = $selMes.value;
    renderBoard();
  });

  /* ── ATUALIZAR ── */
  $btnRef.addEventListener("click", carregarDados);

  /* ── UTILS ── */
  function mostrarLoading(v) { $loading.classList.toggle("active", v); }
  function mostrarErro(msg)  { $error.innerHTML = msg; $error.classList.add("active"); }
  function ocultarErro()     { $error.classList.remove("active"); }

  /* ── SYNC SCROLL contadores ↔ board ── */
  const $counters = document.querySelector(".counters");
  $counters.addEventListener("scroll", () => { $board.parentElement.scrollLeft = $counters.scrollLeft; });
  $board.parentElement.addEventListener("scroll", () => { $counters.scrollLeft = $board.parentElement.scrollLeft; });

  /* ── INIT ── */
  carregarDados();
</script>
</body>
</html>
